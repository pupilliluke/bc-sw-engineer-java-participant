apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-api
  labels:
    app: crm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-api
  template:
    metadata:
      labels:
        app: crm-api
    spec:
      # TODO(lab42): serviceAccountName if required by namespace policy
      containers:
        - name: crm-api
          # TODO(lab42): Replace with digest-pinned image from Lab 41
          image: crm-api:lab41
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: crm-api-config
            # TODO(lab42): secretRef for DB password — create Secret out-of-band
            # - secretRef:
            #     name: crm-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # TODO(lab42): Distinct startup / readiness / liveness probes
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          # startupProbe:
          #   httpGet:
          #     path: /actuator/health/readiness
          #     port: http
          #   failureThreshold: 30
          #   periodSeconds: 5
          securityContext:
            # TODO(lab42): runAsNonRoot: true, runAsUser: 10001, allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
