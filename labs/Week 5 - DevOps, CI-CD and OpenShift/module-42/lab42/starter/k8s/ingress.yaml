apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-api
  labels:
    app: crm-api
  annotations:
    # TODO(lab42): Traefik / TLS annotations per instructor (redirect HTTPS)
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  # TODO(lab42): ingressClassName if required (e.g. traefik)
  rules:
    - host: crm-api.TODO.example.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crm-api
                port:
                  number: 80
