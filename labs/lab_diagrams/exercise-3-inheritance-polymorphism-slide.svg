<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Exercise 3 Inheritance and Polymorphism Slide Diagram</title>
  <desc id="desc">A beginner-friendly diagram explaining Account inheritance, SavingsAccount and CurrentAccount subclasses, and runtime polymorphism through an Account array.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c62828"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 52px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 27px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .section { font: 700 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 700 25px Arial, Helvetica, sans-serif; fill: #111827; }
      .body { font: 400 22px Arial, Helvetica, sans-serif; fill: #374151; }
      .small { font: 400 19px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .code { font: 700 22px "Courier New", monospace; fill: #111827; }
      .codeSmall { font: 700 19px "Courier New", monospace; fill: #111827; }
      .white { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .parent { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 18; }
      .savings { fill: #ecfdf5; stroke: #059669; stroke-width: 3; rx: 18; }
      .current { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; rx: 18; }
      .call { fill: #fef2f2; stroke: #c62828; stroke-width: 3; rx: 18; }
      .array { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 2; rx: 14; }
      .blueLine { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .redLine { stroke: #c62828; stroke-width: 4; fill: none; marker-end: url(#arrow-red); }
      .mutedLine { stroke: #cbd5e1; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect x="48" y="42" width="1504" height="816" rx="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>

  <text x="90" y="108" class="title">Exercise 3: Inheritance and Polymorphism</text>
  <text x="92" y="151" class="subtitle">Main idea: one parent type can point to different child objects, and Java chooses the correct overridden method at runtime.</text>

  <rect x="560" y="205" width="480" height="155" class="parent"/>
  <text x="800" y="250" text-anchor="middle" class="label">Account</text>
  <text x="800" y="290" text-anchor="middle" class="codeSmall">withdraw(amount)</text>
  <text x="800" y="323" text-anchor="middle" class="codeSmall">getAccountType()</text>

  <path d="M705 360 C705 410, 460 410, 460 462" class="blueLine"/>
  <path d="M895 360 C895 410, 1140 410, 1140 462" class="blueLine"/>

  <rect x="250" y="462" width="420" height="145" class="savings"/>
  <text x="460" y="507" text-anchor="middle" class="label">SavingsAccount</text>
  <text x="460" y="547" text-anchor="middle" class="body">inherits Account withdrawal</text>
  <text x="460" y="580" text-anchor="middle" class="codeSmall">type = "Savings"</text>

  <rect x="930" y="462" width="420" height="145" class="current"/>
  <text x="1140" y="507" text-anchor="middle" class="label">CurrentAccount</text>
  <text x="1140" y="547" text-anchor="middle" class="body">overrides withdrawal</text>
  <text x="1140" y="580" text-anchor="middle" class="codeSmall">amount + 2.00 fee</text>

  <rect x="92" y="665" width="512" height="122" class="array"/>
  <text x="120" y="710" class="section">Base-type array</text>
  <text x="120" y="752" class="code">Account[] accounts</text>
  <text x="120" y="780" class="small">stores both SavingsAccount and CurrentAccount objects</text>

  <rect x="671" y="653" width="258" height="146" class="call"/>
  <text x="800" y="703" text-anchor="middle" class="section">Same call</text>
  <text x="800" y="746" text-anchor="middle" class="code">withdraw(20.00)</text>
  <text x="800" y="777" text-anchor="middle" class="small">inside the loop</text>

  <rect x="996" y="657" width="472" height="138" class="panel"/>
  <text x="1025" y="703" class="section">Runtime result</text>
  <text x="1025" y="744" class="codeSmall">Savings balance: 80.00</text>
  <text x="1025" y="777" class="codeSmall">Current balance: 78.00</text>

  <path d="M604 726 L665 726" class="redLine"/>
  <path d="M929 726 L989 726" class="redLine"/>
  <path d="M770 653 C725 628, 570 620, 490 607" class="mutedLine"/>
  <path d="M830 653 C875 628, 1030 620, 1110 607" class="mutedLine"/>

  <rect x="104" y="205" width="330" height="155" rx="18" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="132" y="251" class="section">Beginner takeaway</text>
  <text x="132" y="291" class="body">Variable type controls what</text>
  <text x="132" y="322" class="body">you are allowed to call.</text>
  <text x="132" y="353" class="body">Object type controls which</text>
  <text x="132" y="384" class="body">override actually runs.</text>

  <rect x="1166" y="205" width="310" height="155" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1195" y="251" class="section">Second iteration</text>
  <text x="1195" y="292" class="codeSmall">Reference: Account</text>
  <text x="1195" y="325" class="codeSmall">Object: CurrentAccount</text>
  <text x="1195" y="358" class="codeSmall">Chosen: Current.withdraw</text>

  <text x="800" y="842" text-anchor="middle" class="subtitle">This is runtime polymorphism: the same method call behaves differently based on the actual object.</text>
</svg>
