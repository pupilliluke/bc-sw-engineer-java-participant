# Lab 51 k8s stub — dry-run friendly. Fill TODOs before apply on instructor k3s.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-api
  labels:
    app: crm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-api
  template:
    metadata:
      labels:
        app: crm-api
    spec:
      # TODO: serviceAccountName / imagePullSecrets if required by cohort
      containers:
        - name: crm-api
          # TODO: replace with immutable digest from pipeline
          image: ghcr.io/EXAMPLE_ORG/crm-api:REPLACE_WITH_DIGEST
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # TODO: wire secrets via Secret/ConfigMap — never hardcode passwords
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # TODO: point probes at real actuator / health paths
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: crm-api
spec:
  selector:
    app: crm-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
